name: Staff Management CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Restore backend
        run: dotnet restore Backend/StaffManagement.Tests/StaffManagement.Tests.csproj

      - name: Build backend API
        run: dotnet build Backend/StaffManagement/StaffManagement.csproj --configuration Release --no-restore

      - name: Test backend
        run: dotnet test Backend/StaffManagement.Tests/StaffManagement.Tests.csproj --configuration Release --no-restore --verbosity normal

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: Frontend

      - name: Build frontend
        run: npm run build
        working-directory: Frontend

      - name: Run end-to-end tests
        run: npm run test:e2e
        working-directory: Frontend
