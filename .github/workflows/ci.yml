name: Staff Management CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        run: dotnet restore Backend/Backend.sln

      - name: Build backend
        run: dotnet build Backend/Backend.sln --configuration Release --no-restore

      - name: Test backend
        run: dotnet test Backend/Backend.sln --configuration Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: Frontend

      - name: Build frontend
        run: npm run build
        working-directory: Frontend

  e2e:
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Restore backend
        run: dotnet restore Backend/Backend.sln

      - name: Build backend
        run: dotnet build Backend/Backend.sln --configuration Release --no-restore

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Frontend

      - name: Run end-to-end tests
        run: npm run test:e2e
        working-directory: Frontend
